name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Let deploys queue rather than cancel: cancelling an in-flight Pages deploy
  # (e.g. two PRs merged seconds apart) leaves the deployment in a state that
  # makes the next one fail with "try again later". Matches GitHub's
  # recommended Pages workflow.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs tooling
        run: |
          pip install "mkdocs-material>=9,<10" "mkdocs>=1.6,<2" "mkdocstrings[python]>=0.24"
          sudo apt-get update && sudo apt-get install -y doxygen
      - name: Build site (mkdocs + mkdocstrings)
        run: PYTHONPATH=python mkdocs build --strict
      - name: Generate C++ reference (Doxygen) into the site
        run: MEF3IO_VERSION="$(tr -d ' \n' < VERSION)" doxygen docs/Doxyfile
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
