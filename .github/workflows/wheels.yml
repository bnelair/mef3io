name: build

on:
  push:
    branches: [master, "fmivalt/**"]
  pull_request:
  workflow_dispatch:

jobs:
  # Fast feedback: build + run the C++ core tests and the codec/self tests.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build C++ unit tests
        run: |
          cmake -S core -B build-core -DMEF3IO_BUILD_TESTS=ON
          cmake --build build-core
          ctest --test-dir build-core --output-on-failure
      - name: Install and smoke-test the package
        run: |
          python -m pip install --upgrade pip
          pip install .
          python -c "import mef3io, numpy as np; print('cpp backend:', mef3io.have_cpp_backend())"

  wheels:
    name: wheels on ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
