name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case, not just the proposed API.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. If it touches read/write behavior, note that it should stay consistent across the Python, MATLAB, and C++ layers.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: bindings
    attributes:
      label: Which binding(s)
      multiple: true
      options: [Python, MATLAB, C++ core, all]
